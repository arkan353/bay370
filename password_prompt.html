<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Введите пароль для доступа к ссылке</h1>
    <input type="password" id="password" placeholder="Пароль">
    <input type="hidden" id="short_code" value="{{ short_code }}">
    <button onclick="submitPassword()">Подтвердить</button>
</body>
<script>
    function submitPassword() {
        const password = document.getElementById("password").value;
        const short_code = document.getElementById("short_code").value;
        fetch(`/verify_password/${short_code}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ password })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                window.location.href = data.redirect_url;
            } else {
                alert("Неверный пароль");
            }
        });
    }
</script>
</html>
